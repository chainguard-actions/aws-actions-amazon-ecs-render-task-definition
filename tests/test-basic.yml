name: Test basic task definition rendering
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          task-definition: ${{ github.workspace }}/actions/hardened/aws-actions--amazon-ecs-render-task-definition/v1.8.5/tests/fixtures/task-definition.json
          container-name: my-container
          image: nginx:1.25.0
      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.action.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: output file does not exist at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"
      - name: Assert image was updated
        env:
          TASK_DEF_PATH: ${{ steps.action.outputs.task-definition }}
        run: |
          IMAGE=$(jq -r '.containerDefinitions[0].image' "$TASK_DEF_PATH")
          echo "actual image: $IMAGE"
          if [ "$IMAGE" != "nginx:1.25.0" ]; then
            echo "FAIL: expected image 'nginx:1.25.0', got '$IMAGE'"
            exit 1
          fi
          echo "PASS"
