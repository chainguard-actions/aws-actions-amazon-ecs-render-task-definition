name: Test task definition ARN, family, and revision inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          task-definition-arn: arn:aws:ecs:us-east-1:123456789012:task-definition/my-task-family:5
          task-definition-family: my-task-family
          task-definition-revision: "5"
          container-name: my-container
          image: nginx:1.25.0
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: fake-key
          AWS_SECRET_ACCESS_KEY: fake-secret
      - name: Verify step ran (inputs were accepted)
        run: |
          echo "Action step completed (with or without error due to missing AWS credentials)"
          echo "Inputs task-definition-arn, task-definition-family, task-definition-revision were passed"
          echo "PASS: inputs were accepted by the action"
