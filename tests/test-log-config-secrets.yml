name: Test log configuration, env-files, and secrets
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: render
        uses: .
        with:
          task-definition: ${{ github.workspace }}/actions/hardened/aws-actions--amazon-ecs-render-task-definition/v1.8.3/tests/fixtures/task-definition.json
          container-name: my-container
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-app:v3
          log-configuration-log-driver: awslogs
          log-configuration-options: |
            awslogs-group=/ecs/my-task
            awslogs-region=us-east-1
            awslogs-stream-prefix=ecs
          env-files: |
            arn:aws:s3:::my-bucket/my-env-file.env
          secrets: |
            DB_PASSWORD=arn:aws:secretsmanager:us-east-1:123456789012:secret:my-secret-abc123
      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: output file does not exist at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"
      - name: Assert log configuration was set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          LOG_DRIVER=$(cat "$TASK_DEF_PATH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['containerDefinitions'][0]['logConfiguration']['logDriver'])")
          echo "log driver: $LOG_DRIVER"
          if [ "$LOG_DRIVER" != "awslogs" ]; then
            echo "FAIL: expected log driver to be 'awslogs', got '$LOG_DRIVER'"
            exit 1
          fi
          echo "PASS"
      - name: Assert secrets were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          SECRET_COUNT=$(cat "$TASK_DEF_PATH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['containerDefinitions'][0].get('secrets', [])))")
          echo "secret count: $SECRET_COUNT"
          if [ "$SECRET_COUNT" -lt "1" ]; then
            echo "FAIL: expected at least 1 secret, got $SECRET_COUNT"
            exit 1
          fi
          echo "PASS"
