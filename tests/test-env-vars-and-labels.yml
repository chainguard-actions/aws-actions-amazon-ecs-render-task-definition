name: Test environment variables, docker labels, and command
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: render
        uses: .
        with:
          task-definition: ${{ github.workspace }}/actions/hardened/aws-actions--amazon-ecs-render-task-definition/v1.8.3/tests/fixtures/task-definition.json
          container-name: my-container
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-app:v2
          environment-variables: |
            APP_ENV=production
            LOG_LEVEL=info
          docker-labels: |
            version=1.0
            maintainer=team
          command: /bin/sh -c "echo hello"
      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: output file does not exist at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"
      - name: Assert environment variables were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          ENV_COUNT=$(cat "$TASK_DEF_PATH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['containerDefinitions'][0]['environment']))")
          echo "environment variable count: $ENV_COUNT"
          if [ "$ENV_COUNT" -lt "2" ]; then
            echo "FAIL: expected at least 2 environment variables, got $ENV_COUNT"
            exit 1
          fi
          echo "PASS"
      - name: Assert docker labels were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          LABELS=$(cat "$TASK_DEF_PATH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['containerDefinitions'][0].get('dockerLabels', {}))")
          echo "docker labels: $LABELS"
          if [ -z "$LABELS" ] || [ "$LABELS" = "{}" ]; then
            echo "FAIL: expected docker labels to be set"
            exit 1
          fi
          echo "PASS"
