name: Test log configuration, secrets, and env-files
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          task-definition: ${{ github.workspace }}/actions/hardened/aws-actions--amazon-ecs-render-task-definition/v1.8.5/tests/fixtures/task-definition.json
          container-name: my-container
          image: nginx:1.25.0
          log-configuration-log-driver: awslogs
          log-configuration-options: |
            awslogs-group=/ecs/my-task
            awslogs-region=us-east-1
            awslogs-stream-prefix=ecs
          env-files: |
            arn:aws:s3:::my-bucket/my-env-file.env
          secrets: |
            MY_SECRET=arn:aws:secretsmanager:us-east-1:123456789012:secret:my-secret-AbCdEf
      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.action.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: output file does not exist at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"
      - name: Assert log driver was set
        env:
          TASK_DEF_PATH: ${{ steps.action.outputs.task-definition }}
        run: |
          LOG_DRIVER=$(jq -r '.containerDefinitions[0].logConfiguration.logDriver' "$TASK_DEF_PATH")
          echo "log driver: $LOG_DRIVER"
          if [ "$LOG_DRIVER" != "awslogs" ]; then
            echo "FAIL: expected logDriver='awslogs', got '$LOG_DRIVER'"
            exit 1
          fi
          echo "PASS"
      - name: Assert secrets were set
        env:
          TASK_DEF_PATH: ${{ steps.action.outputs.task-definition }}
        run: |
          SECRET_NAME=$(jq -r '.containerDefinitions[0].secrets[] | select(.name=="MY_SECRET") | .name' "$TASK_DEF_PATH")
          echo "secret name: $SECRET_NAME"
          if [ "$SECRET_NAME" != "MY_SECRET" ]; then
            echo "FAIL: expected secret MY_SECRET to be set, got '$SECRET_NAME'"
            exit 1
          fi
          echo "PASS"
      - name: Assert env-files were set
        env:
          TASK_DEF_PATH: ${{ steps.action.outputs.task-definition }}
        run: |
          ENV_FILE=$(jq -r '.containerDefinitions[0].environmentFiles[0].value' "$TASK_DEF_PATH")
          echo "env file: $ENV_FILE"
          if [ "$ENV_FILE" != "arn:aws:s3:::my-bucket/my-env-file.env" ]; then
            echo "FAIL: expected env file arn, got '$ENV_FILE'"
            exit 1
          fi
          echo "PASS"
