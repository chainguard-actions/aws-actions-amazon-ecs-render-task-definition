name: Test secrets injection
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: render
        uses: .
        with:
          task-definition: tests/fixtures/task-definition.json
          container-name: web
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp:latest
          secrets: |
            DB_PASSWORD=arn:aws:secretsmanager:us-east-1:123456789012:secret:myapp/db-password-AbCdEf
            API_KEY=arn:aws:ssm:us-east-1:123456789012:parameter/myapp/api-key

      - name: Assert task-definition output is set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition path: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          echo "PASS"

      - name: Assert DB_PASSWORD secret was added
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Contents of rendered task definition:"
          cat "$TASK_DEF_PATH"
          DB_SECRET=$(jq -r '.containerDefinitions[] | select(.name=="web") | .secrets[] | select(.name=="DB_PASSWORD") | .valueFrom' "$TASK_DEF_PATH")
          echo "DB_PASSWORD valueFrom: $DB_SECRET"
          if [ "$DB_SECRET" != "arn:aws:secretsmanager:us-east-1:123456789012:secret:myapp/db-password-AbCdEf" ]; then
            echo "FAIL: expected DB_PASSWORD secret ARN, got: $DB_SECRET"
            exit 1
          fi
          echo "PASS: DB_PASSWORD secret was added correctly"

      - name: Assert API_KEY secret was added
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          API_SECRET=$(jq -r '.containerDefinitions[] | select(.name=="web") | .secrets[] | select(.name=="API_KEY") | .valueFrom' "$TASK_DEF_PATH")
          echo "API_KEY valueFrom: $API_SECRET"
          if [ "$API_SECRET" != "arn:aws:ssm:us-east-1:123456789012:parameter/myapp/api-key" ]; then
            echo "FAIL: expected API_KEY secret ARN, got: $API_SECRET"
            exit 1
          fi
          echo "PASS: API_KEY secret was added correctly"

      - name: Assert secrets array has correct count
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          COUNT=$(jq '[.containerDefinitions[] | select(.name=="web") | .secrets[]] | length' "$TASK_DEF_PATH")
          echo "secrets count: $COUNT"
          if [ "$COUNT" != "2" ]; then
            echo "FAIL: expected 2 secrets, got: $COUNT"
            exit 1
          fi
          echo "PASS: correct number of secrets"
