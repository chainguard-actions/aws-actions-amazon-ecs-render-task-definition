name: Test env-files input - render task definition with S3 env files
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: render
        uses: .
        with:
          task-definition: tests/fixtures/task-definition.json
          container-name: web
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp:v2.0.0
          env-files: |
            arn:aws:s3:::my-bucket/my-env-file.env
            arn:aws:s3:::my-bucket/my-other-env-file.env

      - name: Assert task-definition output is set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition path: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          echo "PASS: task-definition output is set"

      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Checking file: $TASK_DEF_PATH"
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: rendered task definition file does not exist at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: rendered task definition file exists"

      - name: Assert image URI was updated
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Contents of rendered task definition:"
          cat "$TASK_DEF_PATH"
          IMAGE=$(jq -r '.containerDefinitions[] | select(.name=="web") | .image' "$TASK_DEF_PATH")
          echo "image: $IMAGE"
          if [ "$IMAGE" != "123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp:v2.0.0" ]; then
            echo "FAIL: expected image URI to be updated, got: $IMAGE"
            exit 1
          fi
          echo "PASS: image URI was correctly updated"

      - name: Assert environmentFiles were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          ENV_FILES_COUNT=$(jq '.containerDefinitions[] | select(.name=="web") | .environmentFiles | length' "$TASK_DEF_PATH")
          echo "environmentFiles count: $ENV_FILES_COUNT"
          if [ "$ENV_FILES_COUNT" != "2" ]; then
            echo "FAIL: expected 2 environmentFiles, got: $ENV_FILES_COUNT"
            exit 1
          fi
          FIRST_VALUE=$(jq -r '.containerDefinitions[] | select(.name=="web") | .environmentFiles[0].value' "$TASK_DEF_PATH")
          echo "first env file value: $FIRST_VALUE"
          if [ "$FIRST_VALUE" != "arn:aws:s3:::my-bucket/my-env-file.env" ]; then
            echo "FAIL: expected first env file ARN, got: $FIRST_VALUE"
            exit 1
          fi
          FIRST_TYPE=$(jq -r '.containerDefinitions[] | select(.name=="web") | .environmentFiles[0].type' "$TASK_DEF_PATH")
          echo "first env file type: $FIRST_TYPE"
          if [ "$FIRST_TYPE" != "s3" ]; then
            echo "FAIL: expected env file type 's3', got: $FIRST_TYPE"
            exit 1
          fi
          echo "PASS: environmentFiles were correctly set"
