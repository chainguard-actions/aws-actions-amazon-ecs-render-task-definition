name: Test log configuration options
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create task definition file
        run: |
          cat > /tmp/task-def-log.json << 'EOF'
          {
            "family": "my-task",
            "containerDefinitions": [
              {
                "name": "app",
                "image": "old-image:latest",
                "cpu": 256,
                "memory": 512,
                "essential": true
              }
            ]
          }
          EOF

      - id: render
        uses: .
        with:
          task-definition: /tmp/task-def-log.json
          container-name: app
          image: myapp:3.0.0
          log-configuration-log-driver: awslogs
          log-configuration-options: |
            awslogs-group=/ecs/my-task
            awslogs-region=us-east-1
            awslogs-stream-prefix=ecs

      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: rendered task definition file not found at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"

      - name: Assert log driver was set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          LOG_DRIVER=$(jq -r '.containerDefinitions[0].logConfiguration.logDriver' "$TASK_DEF_PATH")
          echo "actual logDriver: $LOG_DRIVER"
          if [ "$LOG_DRIVER" != "awslogs" ]; then
            echo "FAIL: expected logDriver 'awslogs', got '$LOG_DRIVER'"
            exit 1
          fi
          echo "PASS: logDriver correctly set"

      - name: Assert log configuration options were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          LOG_GROUP=$(jq -r '.containerDefinitions[0].logConfiguration.options["awslogs-group"]' "$TASK_DEF_PATH")
          echo "actual awslogs-group: $LOG_GROUP"
          if [ "$LOG_GROUP" != "/ecs/my-task" ]; then
            echo "FAIL: expected awslogs-group '/ecs/my-task', got '$LOG_GROUP'"
            exit 1
          fi
          LOG_REGION=$(jq -r '.containerDefinitions[0].logConfiguration.options["awslogs-region"]' "$TASK_DEF_PATH")
          echo "actual awslogs-region: $LOG_REGION"
          if [ "$LOG_REGION" != "us-east-1" ]; then
            echo "FAIL: expected awslogs-region 'us-east-1', got '$LOG_REGION'"
            exit 1
          fi
          echo "PASS: log configuration options correctly set"
