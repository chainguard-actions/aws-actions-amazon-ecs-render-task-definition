name: Test multiple containers - update specific container
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create task definition with multiple containers
        run: |
          cat > /tmp/task-def-multi.json << 'EOF'
          {
            "family": "multi-container-task",
            "containerDefinitions": [
              {
                "name": "app",
                "image": "app:old",
                "cpu": 256,
                "memory": 512,
                "essential": true
              },
              {
                "name": "sidecar",
                "image": "sidecar:old",
                "cpu": 128,
                "memory": 256,
                "essential": false
              }
            ]
          }
          EOF

      - id: render
        uses: .
        with:
          task-definition: /tmp/task-def-multi.json
          container-name: app
          image: app:new-version

      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: rendered task definition file not found at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"

      - name: Assert target container image was updated
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          APP_IMAGE=$(jq -r '.containerDefinitions[] | select(.name=="app") | .image' "$TASK_DEF_PATH")
          echo "actual app image: $APP_IMAGE"
          if [ "$APP_IMAGE" != "app:new-version" ]; then
            echo "FAIL: expected app image 'app:new-version', got '$APP_IMAGE'"
            exit 1
          fi
          echo "PASS: target container image updated"

      - name: Assert other container image was not changed
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          SIDECAR_IMAGE=$(jq -r '.containerDefinitions[] | select(.name=="sidecar") | .image' "$TASK_DEF_PATH")
          echo "actual sidecar image: $SIDECAR_IMAGE"
          if [ "$SIDECAR_IMAGE" != "sidecar:old" ]; then
            echo "FAIL: expected sidecar image 'sidecar:old' (unchanged), got '$SIDECAR_IMAGE'"
            exit 1
          fi
          echo "PASS: other container image unchanged"

      - name: Assert both containers still present
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          COUNT=$(jq '.containerDefinitions | length' "$TASK_DEF_PATH")
          echo "container count: $COUNT"
          if [ "$COUNT" != "2" ]; then
            echo "FAIL: expected 2 containers, got $COUNT"
            exit 1
          fi
          echo "PASS: both containers present"
