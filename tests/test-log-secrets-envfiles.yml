name: Test log-configuration, secrets, and env-files inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: render
        uses: .
        with:
          task-definition: actions/hardened/aws-actions--amazon-ecs-render-task-definition/v1.8.4/tests/fixtures/task-definition.json
          container-name: my-container
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-app:v3
          log-configuration-log-driver: awslogs
          log-configuration-options: |
            awslogs-group=/ecs/my-updated-task
            awslogs-region=us-west-2
            awslogs-stream-prefix=ecs
          secrets: |
            DB_PASSWORD=arn:aws:secretsmanager:us-east-1:123456789012:secret:db-password-abc123
            API_KEY=arn:aws:secretsmanager:us-east-1:123456789012:secret:api-key-xyz789
          env-files: |
            arn:aws:s3:::my-bucket/my-env-file.env
      - name: Assert task-definition output is set
        env:
          ACTUAL: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert log configuration was updated
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Checking log configuration in rendered file..."
          LOG_DRIVER=$(cat "$TASK_DEF_PATH" | python3 -c "import json,sys; td=json.load(sys.stdin); print(td['containerDefinitions'][0]['logConfiguration']['logDriver'])")
          echo "log driver: $LOG_DRIVER"
          if [ "$LOG_DRIVER" != "awslogs" ]; then
            echo "FAIL: expected log driver to be 'awslogs', got '$LOG_DRIVER'"
            exit 1
          fi
          LOG_GROUP=$(cat "$TASK_DEF_PATH" | python3 -c "import json,sys; td=json.load(sys.stdin); print(td['containerDefinitions'][0]['logConfiguration']['options']['awslogs-group'])")
          echo "log group: $LOG_GROUP"
          if [ "$LOG_GROUP" != "/ecs/my-updated-task" ]; then
            echo "FAIL: expected log group to be '/ecs/my-updated-task', got '$LOG_GROUP'"
            exit 1
          fi
          echo "PASS: log configuration was updated"
      - name: Assert secrets were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Checking secrets in rendered file..."
          SECRET_COUNT=$(cat "$TASK_DEF_PATH" | python3 -c "import json,sys; td=json.load(sys.stdin); print(len(td['containerDefinitions'][0].get('secrets', [])))")
          echo "secret count: $SECRET_COUNT"
          if [ "$SECRET_COUNT" -lt "2" ]; then
            echo "FAIL: expected at least 2 secrets, got $SECRET_COUNT"
            exit 1
          fi
          echo "PASS: secrets were set"
      - name: Assert env files were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Checking env files in rendered file..."
          ENV_FILES=$(cat "$TASK_DEF_PATH" | python3 -c "import json,sys; td=json.load(sys.stdin); print(td['containerDefinitions'][0].get('environmentFiles', []))")
          echo "env files: $ENV_FILES"
          if [ -z "$ENV_FILES" ] || [ "$ENV_FILES" = "[]" ]; then
            echo "FAIL: expected env files to be set"
            exit 1
          fi
          echo "PASS: env files were set"
