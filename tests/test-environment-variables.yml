name: Test environment variables injection
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: render
        uses: .
        with:
          task-definition: tests/fixtures/task-definition.json
          container-name: web
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp:latest
          environment-variables: |
            NEW_VAR=new-value
            ANOTHER_VAR=another-value
            EXISTING_VAR=overridden-value

      - name: Assert task-definition output is set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition path: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          echo "PASS"

      - name: Assert new environment variable was added
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Contents of rendered task definition:"
          cat "$TASK_DEF_PATH"
          NEW_VAL=$(jq -r '.containerDefinitions[] | select(.name=="web") | .environment[] | select(.name=="NEW_VAR") | .value' "$TASK_DEF_PATH")
          echo "NEW_VAR value: $NEW_VAL"
          if [ "$NEW_VAL" != "new-value" ]; then
            echo "FAIL: expected NEW_VAR=new-value, got: $NEW_VAL"
            exit 1
          fi
          echo "PASS: NEW_VAR was added correctly"

      - name: Assert second new environment variable was added
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          ANOTHER_VAL=$(jq -r '.containerDefinitions[] | select(.name=="web") | .environment[] | select(.name=="ANOTHER_VAR") | .value' "$TASK_DEF_PATH")
          echo "ANOTHER_VAR value: $ANOTHER_VAL"
          if [ "$ANOTHER_VAL" != "another-value" ]; then
            echo "FAIL: expected ANOTHER_VAR=another-value, got: $ANOTHER_VAL"
            exit 1
          fi
          echo "PASS: ANOTHER_VAR was added correctly"

      - name: Assert existing environment variable was overridden
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          EXISTING_VAL=$(jq -r '.containerDefinitions[] | select(.name=="web") | .environment[] | select(.name=="EXISTING_VAR") | .value' "$TASK_DEF_PATH")
          echo "EXISTING_VAR value: $EXISTING_VAL"
          if [ "$EXISTING_VAL" != "overridden-value" ]; then
            echo "FAIL: expected EXISTING_VAR=overridden-value, got: $EXISTING_VAL"
            exit 1
          fi
          echo "PASS: EXISTING_VAR was overridden correctly"

      - name: Assert no duplicate environment variables
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          COUNT=$(jq '[.containerDefinitions[] | select(.name=="web") | .environment[] | select(.name=="EXISTING_VAR")] | length' "$TASK_DEF_PATH")
          echo "EXISTING_VAR count: $COUNT"
          if [ "$COUNT" != "1" ]; then
            echo "FAIL: expected exactly 1 EXISTING_VAR entry, got: $COUNT"
            exit 1
          fi
          echo "PASS: no duplicate environment variables"
