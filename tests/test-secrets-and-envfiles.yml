name: Test secrets and env-files inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: render
        uses: .
        with:
          task-definition: actions/hardened/aws-actions--amazon-ecs-render-task-definition/v1.8.5/tests/fixtures/task-definition.json
          container-name: my-container
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-app:v3
          secrets: |
            DB_PASSWORD=arn:aws:secretsmanager:us-east-1:123456789012:secret:my-db-password
            API_KEY=arn:aws:secretsmanager:us-east-1:123456789012:secret:my-api-key
          env-files: |
            arn:aws:s3:::my-bucket/my-env-file.env
      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: rendered task definition file does not exist at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"
      - name: Assert secrets were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          DB_SECRET=$(jq -r '.containerDefinitions[] | select(.name=="my-container") | .secrets[] | select(.name=="DB_PASSWORD") | .valueFrom' "$TASK_DEF_PATH")
          echo "actual DB_PASSWORD valueFrom: $DB_SECRET"
          EXPECTED="arn:aws:secretsmanager:us-east-1:123456789012:secret:my-db-password"
          if [ "$DB_SECRET" != "$EXPECTED" ]; then
            echo "FAIL: expected DB_PASSWORD valueFrom '$EXPECTED', got '$DB_SECRET'"
            exit 1
          fi
          API_SECRET=$(jq -r '.containerDefinitions[] | select(.name=="my-container") | .secrets[] | select(.name=="API_KEY") | .valueFrom' "$TASK_DEF_PATH")
          echo "actual API_KEY valueFrom: $API_SECRET"
          EXPECTED_API="arn:aws:secretsmanager:us-east-1:123456789012:secret:my-api-key"
          if [ "$API_SECRET" != "$EXPECTED_API" ]; then
            echo "FAIL: expected API_KEY valueFrom '$EXPECTED_API', got '$API_SECRET'"
            exit 1
          fi
          echo "PASS: secrets correctly set"
      - name: Assert env-files were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          ENV_FILE=$(jq -r '.containerDefinitions[] | select(.name=="my-container") | .environmentFiles[0].value' "$TASK_DEF_PATH")
          echo "actual environmentFiles[0].value: $ENV_FILE"
          EXPECTED="arn:aws:s3:::my-bucket/my-env-file.env"
          if [ "$ENV_FILE" != "$EXPECTED" ]; then
            echo "FAIL: expected environmentFiles[0].value '$EXPECTED', got '$ENV_FILE'"
            exit 1
          fi
          echo "PASS: env-files correctly set"
