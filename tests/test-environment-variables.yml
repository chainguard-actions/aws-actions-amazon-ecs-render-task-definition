name: Test environment variables injection
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create task definition file
        run: |
          cat > /tmp/task-def-env.json << 'EOF'
          {
            "family": "my-task",
            "containerDefinitions": [
              {
                "name": "app",
                "image": "old-image:latest",
                "cpu": 256,
                "memory": 512,
                "essential": true,
                "environment": [
                  {
                    "name": "EXISTING_VAR",
                    "value": "existing-value"
                  }
                ]
              }
            ]
          }
          EOF

      - id: render
        uses: .
        with:
          task-definition: /tmp/task-def-env.json
          container-name: app
          image: myapp:2.0.0
          environment-variables: |
            NEW_VAR=new-value
            ANOTHER_VAR=another-value

      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: rendered task definition file not found at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"

      - name: Assert image was updated
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          IMAGE=$(jq -r '.containerDefinitions[0].image' "$TASK_DEF_PATH")
          echo "actual image: $IMAGE"
          if [ "$IMAGE" != "myapp:2.0.0" ]; then
            echo "FAIL: expected image 'myapp:2.0.0', got '$IMAGE'"
            exit 1
          fi
          echo "PASS: image correctly updated"

      - name: Assert new environment variable was added
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          NEW_VAR=$(jq -r '.containerDefinitions[0].environment[] | select(.name=="NEW_VAR") | .value' "$TASK_DEF_PATH")
          echo "actual NEW_VAR: $NEW_VAR"
          if [ "$NEW_VAR" != "new-value" ]; then
            echo "FAIL: expected NEW_VAR='new-value', got '$NEW_VAR'"
            exit 1
          fi
          ANOTHER_VAR=$(jq -r '.containerDefinitions[0].environment[] | select(.name=="ANOTHER_VAR") | .value' "$TASK_DEF_PATH")
          echo "actual ANOTHER_VAR: $ANOTHER_VAR"
          if [ "$ANOTHER_VAR" != "another-value" ]; then
            echo "FAIL: expected ANOTHER_VAR='another-value', got '$ANOTHER_VAR'"
            exit 1
          fi
          echo "PASS: environment variables correctly injected"
