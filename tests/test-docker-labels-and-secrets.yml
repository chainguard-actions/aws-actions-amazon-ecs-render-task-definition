name: Test docker labels and secrets injection
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create task definition file
        run: |
          cat > /tmp/task-def-labels.json << 'EOF'
          {
            "family": "my-task",
            "containerDefinitions": [
              {
                "name": "app",
                "image": "old-image:latest",
                "cpu": 256,
                "memory": 512,
                "essential": true
              }
            ]
          }
          EOF

      - id: render
        uses: .
        with:
          task-definition: /tmp/task-def-labels.json
          container-name: app
          image: myapp:4.0.0
          docker-labels: |
            version=1.0
            environment=production
          secrets: |
            DB_PASSWORD=arn:aws:secretsmanager:us-east-1:123456789012:secret:db-password-abc123
            API_KEY=arn:aws:ssm:us-east-1:123456789012:parameter/api-key

      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: rendered task definition file not found at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"

      - name: Assert docker labels were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          VERSION=$(jq -r '.containerDefinitions[0].dockerLabels.version' "$TASK_DEF_PATH")
          echo "actual version label: $VERSION"
          if [ "$VERSION" != "1.0" ]; then
            echo "FAIL: expected version label '1.0', got '$VERSION'"
            exit 1
          fi
          ENV_LABEL=$(jq -r '.containerDefinitions[0].dockerLabels.environment' "$TASK_DEF_PATH")
          echo "actual environment label: $ENV_LABEL"
          if [ "$ENV_LABEL" != "production" ]; then
            echo "FAIL: expected environment label 'production', got '$ENV_LABEL'"
            exit 1
          fi
          echo "PASS: docker labels correctly set"

      - name: Assert secrets were set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          DB_SECRET=$(jq -r '.containerDefinitions[0].secrets[] | select(.name=="DB_PASSWORD") | .valueFrom' "$TASK_DEF_PATH")
          echo "actual DB_PASSWORD valueFrom: $DB_SECRET"
          if [ "$DB_SECRET" != "arn:aws:secretsmanager:us-east-1:123456789012:secret:db-password-abc123" ]; then
            echo "FAIL: expected DB_PASSWORD secret ARN, got '$DB_SECRET'"
            exit 1
          fi
          API_SECRET=$(jq -r '.containerDefinitions[0].secrets[] | select(.name=="API_KEY") | .valueFrom' "$TASK_DEF_PATH")
          echo "actual API_KEY valueFrom: $API_SECRET"
          if [ "$API_SECRET" != "arn:aws:ssm:us-east-1:123456789012:parameter/api-key" ]; then
            echo "FAIL: expected API_KEY secret ARN, got '$API_SECRET'"
            exit 1
          fi
          echo "PASS: secrets correctly set"
