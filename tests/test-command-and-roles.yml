name: Test command and role ARN inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create task definition file
        run: |
          cat > /tmp/task-def-roles.json << 'EOF'
          {
            "family": "my-task",
            "containerDefinitions": [
              {
                "name": "worker",
                "image": "worker:old",
                "cpu": 256,
                "memory": 512,
                "essential": true
              }
            ]
          }
          EOF

      - id: render
        uses: .
        with:
          task-definition: /tmp/task-def-roles.json
          container-name: worker
          image: worker:latest
          command: python,app.py,--verbose
          task-role-arn: arn:aws:iam::123456789012:role/MyTaskRole
          execution-role-arn: arn:aws:iam::123456789012:role/MyExecutionRole

      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition output: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: rendered task definition file not found at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: output file exists"

      - name: Assert image was updated
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          IMAGE=$(jq -r '.containerDefinitions[0].image' "$TASK_DEF_PATH")
          echo "actual image: $IMAGE"
          if [ "$IMAGE" != "worker:latest" ]; then
            echo "FAIL: expected image 'worker:latest', got '$IMAGE'"
            exit 1
          fi
          echo "PASS: image correctly updated"

      - name: Assert task role ARN was set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          ROLE=$(jq -r '.taskRoleArn' "$TASK_DEF_PATH")
          echo "actual taskRoleArn: $ROLE"
          if [ "$ROLE" != "arn:aws:iam::123456789012:role/MyTaskRole" ]; then
            echo "FAIL: expected taskRoleArn 'arn:aws:iam::123456789012:role/MyTaskRole', got '$ROLE'"
            exit 1
          fi
          echo "PASS: taskRoleArn correctly set"

      - name: Assert execution role ARN was set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          EXEC_ROLE=$(jq -r '.executionRoleArn' "$TASK_DEF_PATH")
          echo "actual executionRoleArn: $EXEC_ROLE"
          if [ "$EXEC_ROLE" != "arn:aws:iam::123456789012:role/MyExecutionRole" ]; then
            echo "FAIL: expected executionRoleArn 'arn:aws:iam::123456789012:role/MyExecutionRole', got '$EXEC_ROLE'"
            exit 1
          fi
          echo "PASS: executionRoleArn correctly set"

      - name: Assert command was set on container
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          CMD=$(jq -r '.containerDefinitions[0].command | join(",")' "$TASK_DEF_PATH")
          echo "actual command: $CMD"
          if [ "$CMD" != "python,app.py,--verbose" ]; then
            echo "FAIL: expected command 'python,app.py,--verbose', got '$CMD'"
            exit 1
          fi
          echo "PASS: command correctly set"
