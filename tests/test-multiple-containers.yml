name: Test multiple containers update
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: render
        uses: .
        with:
          task-definition: tests/fixtures/task-definition-multi.json
          container-name: web,sidecar
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp:v2.0.0

      - name: Assert task-definition output is set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition path: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          echo "PASS"

      - name: Assert web container image was updated
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Contents of rendered task definition:"
          cat "$TASK_DEF_PATH"
          WEB_IMAGE=$(jq -r '.containerDefinitions[] | select(.name=="web") | .image' "$TASK_DEF_PATH")
          echo "web image: $WEB_IMAGE"
          if [ "$WEB_IMAGE" != "123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp:v2.0.0" ]; then
            echo "FAIL: expected web image to be updated, got: $WEB_IMAGE"
            exit 1
          fi
          echo "PASS: web container image was updated"

      - name: Assert sidecar container image was updated
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          SIDECAR_IMAGE=$(jq -r '.containerDefinitions[] | select(.name=="sidecar") | .image' "$TASK_DEF_PATH")
          echo "sidecar image: $SIDECAR_IMAGE"
          if [ "$SIDECAR_IMAGE" != "123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp:v2.0.0" ]; then
            echo "FAIL: expected sidecar image to be updated, got: $SIDECAR_IMAGE"
            exit 1
          fi
          echo "PASS: sidecar container image was updated"

      - name: Assert both containers are still present
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          COUNT=$(jq '.containerDefinitions | length' "$TASK_DEF_PATH")
          echo "container count: $COUNT"
          if [ "$COUNT" != "2" ]; then
            echo "FAIL: expected 2 containers, got: $COUNT"
            exit 1
          fi
          echo "PASS: both containers are present"
