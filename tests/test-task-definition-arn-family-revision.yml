name: Test task-definition-arn, task-definition-family, and task-definition-revision inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # When task-definition file is provided, it takes precedence over arn/family/revision.
      # This test verifies the inputs are accepted and the action renders correctly
      # using the local file path (no AWS API call is made).
      - id: render
        uses: .
        with:
          task-definition: tests/fixtures/task-definition.json
          task-definition-arn: arn:aws:ecs:us-east-1:123456789012:task-definition/test-task:5
          task-definition-family: test-task
          task-definition-revision: "5"
          container-name: web
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp:v3.0.0

      - name: Assert task-definition output is set
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "task-definition path: $TASK_DEF_PATH"
          if [ -z "$TASK_DEF_PATH" ]; then
            echo "FAIL: task-definition output is empty"
            exit 1
          fi
          echo "PASS: task-definition output is set"

      - name: Assert output file exists
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Checking file: $TASK_DEF_PATH"
          if [ ! -f "$TASK_DEF_PATH" ]; then
            echo "FAIL: rendered task definition file does not exist at $TASK_DEF_PATH"
            exit 1
          fi
          echo "PASS: rendered task definition file exists"

      - name: Assert image URI was updated
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          echo "Contents of rendered task definition:"
          cat "$TASK_DEF_PATH"
          IMAGE=$(jq -r '.containerDefinitions[] | select(.name=="web") | .image' "$TASK_DEF_PATH")
          echo "image: $IMAGE"
          if [ "$IMAGE" != "123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp:v3.0.0" ]; then
            echo "FAIL: expected image URI to be updated, got: $IMAGE"
            exit 1
          fi
          echo "PASS: image URI was correctly updated"

      - name: Assert family is preserved from local file
        env:
          TASK_DEF_PATH: ${{ steps.render.outputs.task-definition }}
        run: |
          FAMILY=$(jq -r '.family' "$TASK_DEF_PATH")
          echo "family: $FAMILY"
          if [ "$FAMILY" != "test-task" ]; then
            echo "FAIL: expected family 'test-task', got: $FAMILY"
            exit 1
          fi
          echo "PASS: family is preserved"
